  <button id="theme-toggle" aria-label="Toggle theme">
    <i id="theme-icon" class="fa-solid fa-moon"></i>
  </button>

  <script>
    (function () {
      var root = document.documentElement;

      function getSystemTheme() {
        return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }

      function getCurrentTheme() {
        return root.getAttribute('data-theme') || getSystemTheme();
      }

      function updateIcon(theme) {
        document.getElementById('theme-icon').className =
          theme === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
      }

      function switchTheme() {
        var current = getCurrentTheme();
        var next = current === 'dark' ? 'light' : 'dark';
        var btn = document.getElementById('theme-toggle');
        var icon = document.getElementById('theme-icon');
        var rect = btn.getBoundingClientRect();
        var x = Math.round(rect.left + rect.width / 2);
        var y = Math.round(rect.top + rect.height / 2);

        root.style.setProperty('--ripple-x', x + 'px');
        root.style.setProperty('--ripple-y', y + 'px');

        icon.classList.add('spinning');

        var doSwitch = function () {
          root.setAttribute('data-theme', next);
          updateIcon(next);
          localStorage.setItem('theme', next);
        };

        if (document.startViewTransition) {
          document.startViewTransition(doSwitch).finished.then(function () {
            icon.classList.remove('spinning');
          });
        } else {
          doSwitch();
          icon.classList.remove('spinning');
        }
      }

      updateIcon(getCurrentTheme());
      document.getElementById('theme-toggle').addEventListener('click', switchTheme);
    })();
  </script>

  <script>
    const translations = {
      en: { greeting: "Greetings, I'm Erik!", comingSoon: "Coming Soon" },
      es: { greeting: "¡Saludos, soy Erik!",   comingSoon: "Próximamente" },
      fr: { greeting: "Bonjour, je suis Erik !", comingSoon: "Bientôt" },
      de: { greeting: "Hallo, ich bin Erik!", comingSoon: "Demnächst" },

      ar: { greeting: "مرحباً، أنا إريك!",   comingSoon: "قريباً" },
      hi: { greeting: "नमस्ते, मैं Erik हूँ!", comingSoon: "जल्द आ रहा है" },
      ru: { greeting: "Привет, я Эрик!",      comingSoon: "Скоро" },
      it: { greeting: "Salve, sono Erik!",    comingSoon: "Prossimamente" },
      nl: { greeting: "Hallo, ik ben Erik!",  comingSoon: "Binnenkort" },
      pl: { greeting: "Witaj, jestem Erik!",  comingSoon: "Wkrótce" },
      sv: { greeting: "Hej, jag är Erik!",   comingSoon: "Kommer snart" },
    };

    const lang = (navigator.language || 'en').split('-')[0];
    const t = translations[lang] || translations['en'];

    document.querySelector('h1').textContent = t.greeting;
    document.querySelectorAll('.project-status').forEach(el => el.textContent = t.comingSoon);

    const el = document.getElementById('redacted-text');
    const label = 'TRELLAIS';
    const blockChars = '█▓▒░▄▀■';
    const glitchChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';

    function rand(set) {
      return set[Math.floor(Math.random() * set.length)];
    }

    function tick() {
      let out = '';
      for (let i = 0; i < label.length; i++) {
        const r = Math.random();
        if (r < 0.55) out += rand(blockChars);
        else if (r < 0.75) out += rand(glitchChars);
        else out += label[i];
      }
      el.textContent = out;
    }

    setInterval(tick, 90);
  </script>
